name: validate-lss

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate example LSS YAML files
        run: python tools/validate_all_examples.py

      - name: LES calculator smoke test
        run: python tools/les_calculator.py --spec examples/minimal-loop.yaml --display
